<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frigobar</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

<header class="top">
    <div class="hotel-name">Hotel: Blue Tree Premium Manaus</div>
    <h2>Frigobar</h2>
    <input type="text" id="num-apartamento" placeholder="Apto">
</header>

<main class="list" id="item-list"></main>

<footer class="bottom">

    <div class="summary-header" onclick="toggleSummary()">
        <span>Consumo</span>
        <span id="toggle-text">Mostrar</span>
    </div>

    <div id="summary-content" class="hidden">
        <div id="added-items-list" class="summary-items"></div>
    </div>

    <div id="total">R$ 0,00</div>

    <button class="send-btn" onclick="shareOnWhatsApp()">
        Enviar Consumo
    </button>

</footer>

</div>

<script>
const items = [
    { name: 'Água Sem Gás', price: 12 },
    { name: 'Água Com Gás', price: 12 },
    { name: 'Refrigerante', price: 10 },
    { name: 'Cerveja Premium', price: 15 },
    { name: 'Achocolatado', price: 9 },
    { name: 'Água de Coco', price: 9 },
    { name: 'Batata Chips', price: 18 },
    { name: 'Barra de Cereais', price: 8 },
    { name: 'Castanha de Caju', price: 11 },
    { name: 'Chocolate Pequeno', price: 9 },
    { name: 'Chocolate Especial', price: 15 },
    { name: 'Chiclete', price: 7 },
    { name: 'Fini', price: 6 },
];

const itemList = document.getElementById('item-list');
const totalDiv = document.getElementById('total');
const addedItemsList = document.getElementById('added-items-list');

const itemQuantities = {};
items.forEach(item => itemQuantities[item.name] = 0);

/* RENDER */
function renderItems() {
    itemList.innerHTML = '';

    items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'item-row';

        row.innerHTML = `
            <div>
                <div class="item-name">${item.name}</div>
                <div class="item-price">R$ ${item.price.toFixed(2)}</div>
            </div>

            <div class="quantity-controls">
                <button class="quantity-button" onclick="changeQty('${item.name}', -1)">-</button>
                <span>${itemQuantities[item.name]}</span>
                <button class="quantity-button" onclick="changeQty('${item.name}', 1)">+</button>
            </div>
        `;

        itemList.appendChild(row);
    });

    updateSummary();
}

function changeQty(name, value) {
    itemQuantities[name] += value;
    if (itemQuantities[name] < 0) itemQuantities[name] = 0;
    renderItems();
}

/* RESUMO */
function updateSummary() {
    let total = 0;
    addedItemsList.innerHTML = '';

    for (let item in itemQuantities) {
        if (itemQuantities[item] > 0) {
            const price = items.find(i => i.name === item).price;
            total += price * itemQuantities[item];

            const el = document.createElement('div');
            el.textContent = `${item} x${itemQuantities[item]}`;
            addedItemsList.appendChild(el);
        }
    }

    totalDiv.textContent = `R$ ${total.toFixed(2)}`;
}

/* TOGGLE */
function toggleSummary() {
    const content = document.getElementById('summary-content');
    const text = document.getElementById('toggle-text');

    content.classList.toggle('hidden');
    text.textContent = content.classList.contains('hidden') ? 'Mostrar' : 'Ocultar';
}

/* WHATSAPP */
function shareOnWhatsApp() {
    const apto = document.getElementById('num-apartamento').value;

    if (!apto) {
        alert("Informe o apartamento");
        return;
    }

    let msg = `Apto: ${apto}\n\n`;

    for (let item in itemQuantities) {
        if (itemQuantities[item] > 0) {
            msg += `${item} x${itemQuantities[item]}\n`;
        }
    }

    msg += `\nTotal: ${totalDiv.textContent}`;
   
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

renderItems();
</script>

</body>
</html>
